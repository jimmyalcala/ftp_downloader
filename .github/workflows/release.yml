name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: ftp_downloader-windows-x86_64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ftp_downloader-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ftp_downloader-macos-aarch64.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ftp_downloader-linux-x86_64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/ftp_downloader.exe dist/
          cp config.toml dist/config.toml.example
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.name }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/ftp_downloader dist/
          cp config.toml dist/config.toml.example
          tar -czf ${{ matrix.name }} -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
